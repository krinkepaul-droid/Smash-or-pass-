name: Reusable Build and Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Tag to create (e.g. v1.0.0)"
        required: true
        type: string

      release_name:
        description: "Release display name (optional)"
        required: false
        type: string
        default: ""

      overwrite_release:
        description: "Delete existing release with same tag"
        required: false
        type: boolean
        default: true

      draft:
        description: "Create draft release"
        required: false
        type: boolean
        default: false

      prerelease:
        description: "Create prerelease"
        required: false
        type: boolean
        default: false

      app_name:
        description: "Output application / game name"
        required: false
        type: string
        default: "Email adress generator"

      main_py_file:
        description: "Main python entry file"
        required: false
        type: string
        default: "generator.py"

      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.10"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs_on: windows-latest
            artifact_name: windows
            output_file: "${{ inputs.app_name }}.exe"
            shell: pwsh

          - name: linux-ubuntu
            runs_on: ubuntu-latest
            artifact_name: linux-ubuntu
            output_file: "${{ inputs.app_name }}"
            shell: bash

          - name: linux-arch
            runs_on: ubuntu-latest
            container_image: archlinux:latest
            artifact_name: linux-arch
            output_file: "${{ inputs.app_name }}"
            shell: sh

    container: ${{ matrix.container_image || null }}

    steps:
      - uses: actions/checkout@v4

      # ---------- Python setup ----------
      - name: Set up Python
        if: ${{ !matrix.container_image }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python + PyInstaller (Arch container)
        if: ${{ matrix.name == 'linux-arch' }}
        shell: sh
        run: |
          set -eu
          pacman -Sy --noconfirm
          pacman -S --noconfirm python python-pip tk base-devel
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install PyInstaller
        if: ${{ matrix.name != 'linux-arch' }}
        shell: ${{ matrix.shell }}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # ---------- Build Windows ----------
      - name: Build Windows EXE
        if: ${{ matrix.name == 'windows' }}
        shell: pwsh
        run: |
          $App = "${{ inputs.app_name }}"
          pyinstaller --onefile --noconsole --name "$App" "${{ inputs.main_py_file }}"

          if (!(Test-Path "dist\$App.exe")) {
            throw "Expected dist\$App.exe not found"
          }

          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "dist\$App.exe" "out\$App-windows.exe" -Force

      # ---------- Build Ubuntu Linux ----------
      - name: Build Ubuntu Linux binary
        if: ${{ matrix.name == 'linux-ubuntu' }}
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ inputs.app_name }}"

          pyinstaller --onefile --noconsole --name "$APP" "${{ inputs.main_py_file }}"

          if [ ! -f "dist/$APP" ]; then
            echo "Expected dist/$APP not found"
            ls -la dist || true
            exit 1
          fi

          mkdir -p out
          cp "dist/$APP" "out/$APP-linux-ubuntu"
          chmod +x "out/$APP-linux-ubuntu"

      # ---------- Build Arch Linux ----------
      - name: Build Arch Linux binary
        if: ${{ matrix.name == 'linux-arch' }}
        shell: sh
        run: |
          set -eu
          APP="${{ inputs.app_name }}"

          pyinstaller --onefile --noconsole --name "$APP" "${{ inputs.main_py_file }}"

          if [ ! -f "dist/$APP" ]; then
            echo "Expected dist/$APP not found"
            ls -la dist || true
            exit 1
          fi

          mkdir -p out
          cp "dist/$APP" "out/$APP-linux-arch"
          chmod +x "out/$APP-linux-arch"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.artifact_name }}
          path: out/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: downloaded

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release_assets
          cp downloaded/* release_assets/ || true
          chmod +x release_assets/* || true
          echo "Assets:"
          ls -la release_assets

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          cd release_assets

          if [ "$(ls -A .)" = "" ]; then
            echo "No assets found"
            exit 1
          fi

          sha256sum * | LC_ALL=C sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Delete existing release (optional)
        if: ${{ inputs.overwrite_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag_name }}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          fi

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag_name }}"
          TITLE_INPUT="${{ inputs.release_name }}"

          if [ -n "$TITLE_INPUT" ]; then
            TITLE="$TITLE_INPUT"
          else
            TITLE="Release $TAG"
          fi

          FLAGS=()
          ${{ inputs.draft }} && FLAGS+=(--draft)
          ${{ inputs.prerelease }} && FLAGS+=(--prerelease)

          gh release create "$TAG" release_assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes "" \
            "${FLAGS[@]}"
